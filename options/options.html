<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theater Everywhere - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <header class="header">
      <p class="subtitle">Exclude websites where you don't want theater mode to activate automatically when pressing [T].</p>
    </header>

    <main class="main-card">
      <section class="add-section">
        <h2>Add Exclusion</h2>
        <form id="add-domain-form" class="add-form">
          <div class="input-row">
            <input type="text" id="domain-input" placeholder="e.g., youtube.com or paste a URL" required autocomplete="off">
            <button type="submit" class="primary-btn">+</button>
          </div>
          <span id="validation-msg" class="validation-msg"></span>
        </form>
      </section>

      <section class="list-section">
        <div class="section-header">
          <h2>Excluded Websites</h2>
          <span id="blacklist-count" class="badge">0</span>
        </div>
        <div id="blacklist-container" class="blacklist-container">
          <!-- Dynamically populated -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <p>Tip: You can also manage exclusions directly by clicking the extension icon in your toolbar.</p>
        <p class="copyright">&copy; 2026 Tomasz Janusz. All rights reserved.</p>
      </div>
    </footer>
  </div>
  <script type="module" src="options.ts"></script>
</body>
</html>
