name: Build and Release
run-name: Build & Release ${{ inputs.tag_name || github.ref_name }} by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to create (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Tag Name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Create, Bump version and Push Tag (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Fetch existing tags
          git fetch --tags
          
          if git rev-parse "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.RELEASE_TAG }} already exists. Skipping version bump and tag creation."
          else
            # Strip leading 'v' if present (e.g. v1.0.0 -> 1.0.0)
            VERSION_NUMBER=$(echo "${{ env.RELEASE_TAG }}" | sed 's/^v//')
            echo "Bumping version in package.json and manifest.json to $VERSION_NUMBER..."
            
            # Bump version in package.json
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '$VERSION_NUMBER';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n', 'utf8');
            "
            
            # Bump version in manifest.json
            node -e "
              const fs = require('fs');
              const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
              manifest.version = '$VERSION_NUMBER';
              fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n', 'utf8');
            "
            
            # Update CHANGELOG.md — rename [Unreleased] to the new version with today's date
            node -e "
              const fs = require('fs');
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const today = new Date().toISOString().split('T')[0];
              const replaced = changelog.replace(
                /##\\s*\\[?Unreleased\\]?/i,
                '## [Unreleased]\\n\\n## [' + '$VERSION_NUMBER' + '] - ' + today
              );
              fs.writeFileSync('CHANGELOG.md', replaced, 'utf8');
            "
            
            # Update pnpm-lock.yaml to match new package version
            pnpm install --no-frozen-lockfile
            
            # Commit changes
            git add package.json pnpm-lock.yaml manifest.json CHANGELOG.md
            git commit -m "chore(release): bump version to $VERSION_NUMBER and update changelog"
            
            # Push changes back to the triggering branch
            git push origin HEAD:${{ github.ref_name }}
            
            # Tag the new commit and push tag
            echo "Creating and pushing tag ${{ env.RELEASE_TAG }}..."
            git tag "${{ env.RELEASE_TAG }}"
            git push origin "${{ env.RELEASE_TAG }}"
          fi

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Extension
        run: pnpm run build

      - name: Extract Release Notes
        run: |
          VERSION_NUMBER=$(echo "${{ env.RELEASE_TAG }}" | sed 's/^v//')
          pnpm tsx scripts/extract-changelog.ts "$VERSION_NUMBER"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            dist/theater-everywhere-chrome.zip \
            dist/theater-everywhere-firefox.zip \
            --title "Release ${{ env.RELEASE_TAG }}" \
            --notes-file dist/release_notes.md

      - name: Create source archive for AMO review
        if: vars.AMO_PUBLISH_ENABLED == 'true'
        run: git archive --format=zip --output dist/theater-everywhere-source.zip HEAD

      - name: Publish to Mozilla Add-ons
        if: vars.AMO_PUBLISH_ENABLED == 'true'
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "AMO_PUBLISH_ENABLED is true, but AMO_JWT_ISSUER or AMO_JWT_SECRET is missing." >&2
            exit 1
          fi

          pnpm dlx web-ext@10.4.0 sign \
            --source-dir dist/firefox-unpacked \
            --artifacts-dir dist/amo-artifacts \
            --channel=listed \
            --approval-timeout=0 \
            --upload-source-code dist/theater-everywhere-source.zip \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"

      - name: Publish to Chrome Web Store
        if: vars.CWS_PUBLISH_ENABLED == 'true'
        env:
          CWS_EXTENSION_ID: ${{ vars.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ vars.CWS_PUBLISHER_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: pnpm tsx scripts/publish-chrome-webstore.ts

      - name: Publish to Microsoft Edge Add-ons
        if: vars.EDGE_PUBLISH_ENABLED == 'true'
        env:
          EDGE_PRODUCT_ID: ${{ vars.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ vars.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
          EDGE_PUBLISH_NOTES: Release ${{ env.RELEASE_TAG }}
        run: pnpm tsx scripts/publish-edge-addons.ts
