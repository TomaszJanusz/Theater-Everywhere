name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to create (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Tag Name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Create and Push Tag (Manual Run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Fetch existing tags
          git fetch --tags
          
          if git rev-parse "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.RELEASE_TAG }} already exists. Skipping creation."
          else
            echo "Creating and pushing tag ${{ env.RELEASE_TAG }}..."
            git tag "${{ env.RELEASE_TAG }}"
            git push origin "${{ env.RELEASE_TAG }}"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Extension
        run: npm run build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            dist/theater-everywhere-chrome.zip \
            dist/theater-everywhere-firefox.zip \
            --title "Release ${{ env.RELEASE_TAG }}" \
            --generate-notes
