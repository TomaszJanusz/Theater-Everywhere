<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="extensionName">Theater Mode Everywhere</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo-area">
        <div class="logo-icon-svg">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="24" height="24" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
            <g transform="matrix(1.457306,1.457306,-1.445295,1.445295,341.469936,-459.223594)">
              <path d="M452.463,207.464L286.575,249.151L411.119,374.731Z" fill="#ffffff"/>
              <path d="M564,131.691L564,422.309C564,442.559 547.695,459 527.611,459L239.389,459C219.305,459 203,442.559 203,422.309L203,131.691C203,111.441 219.305,95 239.389,95L527.611,95C547.695,95 564,111.441 564,131.691ZM452.463,207.464L286.575,249.151L411.119,374.731L452.463,207.464Z" fill="var(--accent-color)"/>
            </g>
          </svg>
        </div>
        <span class="logo-text">Theater Mode <span class="accent">Everywhere</span></span>
      </div>
      <button id="options-btn" class="icon-btn" title="Settings" data-i18n-title="settingsTitle">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <main class="content">
      <div class="status-card">
        <div class="domain-info">
          <span class="label" data-i18n="websiteLabel">Website</span>
          <span id="domain-name" class="value" data-i18n="loadingLabel">Loading...</span>
        </div>
        <div class="toggle-wrapper">
          <div class="status-indicator">
            <span id="status-dot" class="dot active"></span>
            <span id="status-text" class="status-msg" data-i18n="statusActive">Active</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="extension-toggle" checked>
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="shortcut-tip">
        <kbd class="key-cap">T</kbd>
        <span class="tip-text" data-i18n="toggleTheaterModeLower">Toggle theater mode</span>
      </div>
      <div class="creator-credits" data-i18n="createdBy">Created by Tomasz Janusz</div>
    </footer>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
